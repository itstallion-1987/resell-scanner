name = "resell-scanner-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# KV: счётчики лимитов устройств + кэш статуса подписки
[[kv_namespaces]]
binding = "LIMITS"
id = "2a10ba3f5bfc4b308235b4a24f2fe799"

# Workers Analytics Engine: метрики качества и воронки (бесплатно, без сторонних SDK).
# Запрос данных — через GraphQL Analytics API аккаунта Cloudflare.
# ВРЕМЕННО отключено: сначала включить в дашборде (Workers & Pages -> Analytics Engine),
# затем раскомментировать и передеплоить. Код работает и без биндинга (env.ANALYTICS?).
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "resell_scanner_events"

[vars]
# claude-sonnet-4-6 укладывается в критерий себестоимости <= $0.04 за объявление
# (3 фото ~4.8K токенов входа + ~0.8K выхода ~= $0.03). Opus превышает бюджет.
MODEL = "claude-sonnet-4-6"
FREE_TOTAL_LIMIT = "5"
DAILY_CAP = "300"
# Глобальный дневной потолок генераций — предохранитель бюджета Anthropic, не зависит от device-id.
# Выставить в ~2-3x ожидаемого дневного объёма. 5000 * ~$0.03 = ~$150/день максимум.
GLOBAL_DAILY_CAP = "5000"
DEV_MODE = "0"

# Секреты (задать через `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY   - ключ Anthropic API (только здесь, никогда в приложении)
#   REVENUECAT_SECRET   - секретный ключ RevenueCat (проверка подписки server-side)
#   APP_SHARED_SECRET   - общий токен приложения (минимальная защита от чужого трафика)
