# XcodeGen-манифест. На Mac: brew install xcodegen && cd ios && xcodegen generate
name: ResellScanner
options:
  bundleIdPrefix: com.example # TODO: заменить на свой bundle id prefix
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    majorVersion: 5.0.0
targets:
  ResellScanner:
    type: application
    platform: iOS
    sources:
      - ResellScanner
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: "apple-generic"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Токен воркера подставляется при релизной сборке (xcodebuild ... APP_SHARED_TOKEN=...
        # или через gitignored Secrets.xcconfig). По умолчанию пусто -> код берёт плейсхолдер.
        APP_SHARED_TOKEN: ""
    info:
      path: ResellScanner/Info.plist
      properties:
        CFBundleDisplayName: Resell Scanner
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: The camera is used to photograph items you want to list for sale.
        NSPhotoLibraryUsageDescription: Pick existing photos of your item to create a listing.
        ITSAppUsesNonExemptEncryption: false
        APP_SHARED_TOKEN: $(APP_SHARED_TOKEN)
# Явная shared-схема — нужна для сборки через xcodebuild -scheme в CI
# (XcodeGen не создаёт схемы без этого блока).
schemes:
  ResellScanner:
    build:
      targets:
        ResellScanner: all
    run:
      config: Debug
    archive:
      config: Release
