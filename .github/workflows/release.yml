name: Release to TestFlight

# Запускается вручную из вкладки Actions (кнопка "Run workflow").
# Требует заполненных GitHub Secrets — см. docs/release-pipeline.md.
on:
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - certs

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - name: fastlane ${{ inputs.lane }}
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # base64 от "x-access-token:<PAT>" — доступ к приватному репо сертификатов
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_SHARED_TOKEN: ${{ secrets.APP_SHARED_TOKEN }}
          FASTLANE_HIDE_CHANGELOG: "true"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: bundle exec fastlane ${{ inputs.lane }}

      - name: Upload .ipa artifact
        if: ${{ inputs.lane == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: ResellScanner-ipa
          path: ios/build/*.ipa
          if-no-files-found: warn
