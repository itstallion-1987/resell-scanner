name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Собирает iOS-приложение на НАСТОЯЩЕМ macOS-раннере — проверяет компиляцию Swift,
  # которую нельзя выполнить на Windows. Без подписи (developer-аккаунт не нужен).
  ios-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build for iOS Simulator (no code signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project ResellScanner.xcodeproj \
            -scheme ResellScanner \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  # Тесты прокси (Cloudflare Worker) — те же 38, что гоняем локально.
  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: proxy
        run: npm ci

      - name: Typecheck
        working-directory: proxy
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: proxy
        run: npm test
